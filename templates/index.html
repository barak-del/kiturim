<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>קיטורים 💨 - הפוך תלונות לחיוך</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Background steam clouds -->
    <div class="bg-clouds">
        <svg class="cloud cloud-1" viewBox="0 0 200 100" fill="none">
            <path d="M30 70 Q30 40 60 40 Q60 20 90 25 Q110 10 130 25 Q160 15 165 40 Q190 40 185 65 Q190 85 160 80 L40 80 Q20 85 30 70Z" fill="rgba(181,216,247,0.15)" stroke="rgba(181,216,247,0.3)" stroke-width="1.5"/>
        </svg>
        <svg class="cloud cloud-2" viewBox="0 0 200 100" fill="none">
            <path d="M30 70 Q30 40 60 40 Q60 20 90 25 Q110 10 130 25 Q160 15 165 40 Q190 40 185 65 Q190 85 160 80 L40 80 Q20 85 30 70Z" fill="rgba(255,218,193,0.12)" stroke="rgba(255,218,193,0.25)" stroke-width="1.5"/>
        </svg>
        <svg class="cloud cloud-3" viewBox="0 0 200 100" fill="none">
            <path d="M30 70 Q30 40 60 40 Q60 20 90 25 Q110 10 130 25 Q160 15 165 40 Q190 40 185 65 Q190 85 160 80 L40 80 Q20 85 30 70Z" fill="rgba(181,234,215,0.12)" stroke="rgba(181,234,215,0.25)" stroke-width="1.5"/>
        </svg>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-area">
                <svg class="logo-steam" viewBox="0 0 60 60" width="60" height="60">
                    <circle cx="30" cy="35" r="20" fill="#FFDAC1" stroke="#333" stroke-width="2"/>
                    <path d="M22 33 Q22 28 30 28 Q38 28 38 33" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="24" cy="32" r="2" fill="#333"/>
                    <circle cx="36" cy="32" r="2" fill="#333"/>
                    <path d="M20 44 Q30 52 40 44" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                    <!-- Steam -->
                    <path class="steam steam-1" d="M25 15 Q22 8 25 2" fill="none" stroke="#B5D8F7" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam-2" d="M30 13 Q33 6 30 0" fill="none" stroke="#B5EAD7" stroke-width="2" stroke-linecap="round"/>
                    <path class="steam steam-3" d="M35 15 Q38 8 35 2" fill="none" stroke="#FFDAC1" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <h1>קיטורים <span class="by-line">by Barak Markov</span></h1>
            </div>
            <p class="subtitle">הפוך את הקיטור שלך לחיוך</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-card">
                <label for="complaint">מה מציק לך היום?</label>
                <textarea id="complaint" placeholder="למשל: הזמנתי קפה והחלב לא היה מספיק מוקצף..." maxlength="500" rows="4"></textarea>
                <div class="input-footer">
                    <span class="char-count"><span id="charCount">0</span>/500</span>
                    <button id="submitBtn" class="submit-btn">
                        <span class="btn-text">שלח קיטור</span>
                        <span class="btn-steam">💨</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <section id="loading" class="loading hidden">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p id="loadingText">מנתח את רמת התלונה...</p>
            </div>
        </section>

        <!-- Results Section -->
        <section id="results" class="results hidden">
            <!-- Bougie Meter -->
            <div class="bougie-meter">
                <h2>מד התלונה</h2>
                <div class="meter-container">
                    <div class="coffee-cup">
                        <svg viewBox="0 0 120 140" width="120" height="140">
                            <!-- Cup body -->
                            <path d="M20 30 L25 120 Q25 135 60 135 Q95 135 95 120 L100 30" fill="#fff" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <!-- Coffee fill -->
                            <clipPath id="cupClip">
                                <path d="M22 32 L26 118 Q26 133 60 133 Q94 133 94 118 L98 32Z"/>
                            </clipPath>
                            <rect id="coffeeFill" x="20" y="130" width="80" height="105" fill="#FFDAC1" clip-path="url(#cupClip)" class="coffee-fill"/>
                            <!-- Foam -->
                            <g id="foam" class="foam hidden">
                                <ellipse cx="60" cy="32" rx="38" ry="8" fill="#FFF3B0" stroke="#333" stroke-width="1.5"/>
                                <circle cx="45" cy="30" r="4" fill="#fff" opacity="0.6"/>
                                <circle cx="65" cy="31" r="3" fill="#fff" opacity="0.4"/>
                            </g>
                            <!-- Handle -->
                            <path d="M100 50 Q125 50 125 75 Q125 100 100 100" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                            <!-- Cup rim -->
                            <ellipse cx="60" cy="30" rx="40" ry="8" fill="#f8f8f8" stroke="#333" stroke-width="2.5"/>
                        </svg>
                    </div>
                    <div class="meter-info">
                        <div class="meter-score" id="meterScore"></div>
                        <div class="meter-stars" id="meterStars"></div>
                        <p class="meter-text" id="meterText"></p>
                    </div>
                </div>
            </div>

            <!-- Response Cards -->
            <div class="cards-container">
                <!-- Cynic Card -->
                <div class="response-card card-cynic" data-persona="cynic" onclick="this.classList.toggle('open')">
                    <div class="card-header">
                        <svg class="card-icon" viewBox="0 0 60 60" width="50" height="50">
                            <circle cx="30" cy="33" r="18" fill="#FFE5CC" stroke="#333" stroke-width="2"/>
                            <path d="M14 20 L18 8 L26 18" fill="#FFE5CC" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M46 20 L42 8 L34 18" fill="#FFE5CC" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M16 18 L19 10 L24 17" fill="#FFDAC1" stroke="none"/>
                            <path d="M44 18 L41 10 L36 17" fill="#FFDAC1" stroke="none"/>
                            <rect x="17" y="28" width="12" height="8" rx="2" fill="#333" stroke="#333" stroke-width="1.5"/>
                            <rect x="33" y="28" width="12" height="8" rx="2" fill="#333" stroke="#333" stroke-width="1.5"/>
                            <line x1="29" y1="32" x2="33" y2="32" stroke="#333" stroke-width="1.5"/>
                            <path d="M24 41 Q30 44 38 40" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                            <line x1="4" y1="33" x2="16" y2="35" stroke="#333" stroke-width="1" opacity="0.5"/>
                            <line x1="4" y1="38" x2="16" y2="38" stroke="#333" stroke-width="1" opacity="0.5"/>
                            <line x1="56" y1="33" x2="44" y2="35" stroke="#333" stroke-width="1" opacity="0.5"/>
                            <line x1="56" y1="38" x2="44" y2="38" stroke="#333" stroke-width="1" opacity="0.5"/>
                        </svg>
                        <h3>הציניקן</h3>
                        <span class="card-tap-hint">לחץ לתגובה</span>
                        <span class="card-chevron">&#x25BC;</span>
                    </div>
                    <div class="card-body">
                        <p class="card-text" id="cynicText"></p>
                    </div>
                </div>

                <!-- Philosopher Card -->
                <div class="response-card card-philosopher" data-persona="philosopher" onclick="this.classList.toggle('open')">
                    <div class="card-header">
                        <svg class="card-icon" viewBox="0 0 60 60" width="50" height="50">
                            <ellipse cx="30" cy="35" rx="20" ry="18" fill="#E8D5F5" stroke="#333" stroke-width="2"/>
                            <circle cx="22" cy="30" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
                            <circle cx="38" cy="30" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
                            <circle cx="22" cy="30" r="4" fill="#333"/>
                            <circle cx="38" cy="30" r="4" fill="#333"/>
                            <circle cx="23" cy="29" r="1.5" fill="#fff"/>
                            <circle cx="39" cy="29" r="1.5" fill="#fff"/>
                            <circle cx="22" cy="30" r="10" fill="none" stroke="#333" stroke-width="2"/>
                            <circle cx="38" cy="30" r="10" fill="none" stroke="#333" stroke-width="2"/>
                            <line x1="32" y1="28" x2="28" y2="28" stroke="#333" stroke-width="2"/>
                            <path d="M27 37 L30 42 L33 37" fill="#FFC107" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
                            <path d="M12 22 L16 12 L22 20" fill="#E8D5F5" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
                            <path d="M48 22 L44 12 L38 20" fill="#E8D5F5" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
                            <rect x="18" y="48" width="24" height="6" rx="1" fill="#B5D8F7" stroke="#333" stroke-width="1.5"/>
                            <line x1="30" y1="48" x2="30" y2="54" stroke="#333" stroke-width="1"/>
                        </svg>
                        <h3>הפילוסוף</h3>
                        <span class="card-tap-hint">לחץ לתגובה</span>
                        <span class="card-chevron">&#x25BC;</span>
                    </div>
                    <div class="card-body">
                        <p class="card-text" id="philosopherText"></p>
                    </div>
                </div>

                <!-- Keresh Card -->
                <div class="response-card card-keresh" data-persona="keresh" onclick="this.classList.toggle('open')">
                    <div class="card-header">
                        <svg class="card-icon" viewBox="0 0 60 60" width="50" height="50">
                            <rect x="12" y="10" width="36" height="45" rx="4" fill="#DEB887" stroke="#333" stroke-width="2"/>
                            <path d="M18 15 Q25 20 18 30 Q25 38 18 50" fill="none" stroke="#C4A06A" stroke-width="1" opacity="0.5"/>
                            <path d="M30 12 Q35 25 30 35 Q35 45 30 53" fill="none" stroke="#C4A06A" stroke-width="1" opacity="0.5"/>
                            <path d="M42 15 Q37 22 42 32 Q37 42 42 50" fill="none" stroke="#C4A06A" stroke-width="1" opacity="0.5"/>
                            <circle cx="23" cy="28" r="3" fill="#333"/>
                            <circle cx="37" cy="28" r="3" fill="#333"/>
                            <circle cx="24" cy="27" r="1" fill="#fff"/>
                            <circle cx="38" cy="27" r="1" fill="#fff"/>
                            <path d="M20 38 Q30 48 40 38" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
                            <circle cx="18" cy="35" r="3" fill="#FFDAC1" opacity="0.7"/>
                            <circle cx="42" cy="35" r="3" fill="#FFDAC1" opacity="0.7"/>
                        </svg>
                        <h3>הקרש</h3>
                        <span class="card-tap-hint">לחץ לתגובה</span>
                        <span class="card-chevron">&#x25BC;</span>
                    </div>
                    <div class="card-body">
                        <p class="card-text" id="kereshText"></p>
                    </div>
                </div>
            </div>

            <!-- Try Again -->
            <button id="resetBtn" class="reset-btn">עוד קיטור? 💨</button>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>קיטורים &copy; 2026 - כי לפעמים צריך פשוט לצחוק על זה</p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
